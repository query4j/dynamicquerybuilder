post_review:
  create_branch: "fix/{{ branch }}-coderabbit-review"
  
  apply_suggestions: true
  
  create_pull_request:
    target: "{{ branch }}"
    title: "chore: automated fixes & improvements from CodeRabbit review on {{ branch }}"
    description: |
      This pull request includes automated fixes and suggestions generated by CodeRabbit to:
      - Enforce code style and linting consistency
      - Improve readability and maintainability
      - Address security and performance recommendations
    labels:
      - auto-fix
      - review-suggestions
      - quality-automation
    reviewers:
      - "@query4j"
      - "@sandeep-jaiswar"
      - "@code-review-team"

  trigger_on:
    branches:
      include:
        - "feature/*"
        - "bugfix/*"
        - "hotfix/*"
    schedule:
      cron: "0 2 * * *"

  inline_comments_for_non_applied_suggestions: true

  security_checks: true

  performance_checks: true

  thresholds:
    max_fixes_per_run: 50
    fix_confidence_minimum: 0.85

  enable_historical_metrics: true

  ignore_paths:
    - "src/generated/**"
    - "lib/**"
    - "docs/**"

  ci_integration:
    enabled: true
    job_name: "CodeRabbit Review & Fix"
    retry_on_failure: 2