name: CI with CodeRabbit Review

on:
  push:
    branches:
      - main
      - 'feature/*'
      - 'bugfix/*'
  pull_request:
    branches:
      - main
      - 'feature/*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'

    - name: Build & Test
      run: mvn clean verify

    - name: Run CodeRabbit AI Review
      uses: coderabbitai/ci-action@v1
      with:
        config-file: .coderabbit.yml