name: CodeRabbit-Copilot Feedback Sync

# Trigger on PR events and issue comments to detect CodeRabbit feedback
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  detect-coderabbit-feedback:
    name: Detect and Process CodeRabbit Feedback
    runs-on: ubuntu-latest
    if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review' || github.event_name == 'pull_request_review_comment'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect CodeRabbit Comments
        id: detect_feedback
        uses: actions/github-script@v7
        with:
          script: |
            const { context, github } = require('@actions/github');
            
            // Check if comment is from CodeRabbit
            let isCodeRabbitComment = false;
            let commentBody = '';
            let commentId = '';
            let prNumber = '';
            
            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment;
              isCodeRabbitComment = comment.user.login === 'coderabbitai[bot]' || 
                                   comment.body.includes('@coderabbitai') ||
                                   comment.body.includes('CodeRabbit');
              commentBody = comment.body;
              commentId = comment.id;
              prNumber = context.payload.issue.number;
            } else if (context.eventName === 'pull_request_review_comment') {
              const comment = context.payload.comment;
              isCodeRabbitComment = comment.user.login === 'coderabbitai[bot]' ||
                                   comment.body.includes('@coderabbitai') ||
                                   comment.body.includes('CodeRabbit');
              commentBody = comment.body;
              commentId = comment.id;
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'pull_request_review') {
              const review = context.payload.review;
              isCodeRabbitComment = review.user.login === 'coderabbitai[bot]' ||
                                   (review.body && (review.body.includes('@coderabbitai') || review.body.includes('CodeRabbit')));
              commentBody = review.body || '';
              commentId = review.id;
              prNumber = context.payload.pull_request.number;
            }
            
            core.setOutput('is_coderabbit', isCodeRabbitComment);
            core.setOutput('comment_body', commentBody);
            core.setOutput('comment_id', commentId);
            core.setOutput('pr_number', prNumber);
            
            console.log(`CodeRabbit comment detected: ${isCodeRabbitComment}`);
            console.log(`PR Number: ${prNumber}`);
            
            return isCodeRabbitComment;

      - name: Parse CodeRabbit Feedback
        if: steps.detect_feedback.outputs.is_coderabbit == 'true'
        id: parse_feedback
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = '${{ steps.detect_feedback.outputs.comment_body }}';
            
            // Parse actionable suggestions from CodeRabbit comment
            const suggestions = [];
            const issues = [];
            
            // Look for code suggestions (usually marked with ```suggestion or similar)
            const suggestionRegex = /```suggestion\n(.*?)\n```/gs;
            let match;
            while ((match = suggestionRegex.exec(commentBody)) !== null) {
              suggestions.push(match[1]);
            }
            
            // Look for specific issues or problems mentioned
            const issuePatterns = [
              /⚠️.*?(?=\n|$)/g,
              /❌.*?(?=\n|$)/g,
              /🚨.*?(?=\n|$)/g,
              /Consider.*?(?=\n|$)/gi,
              /Suggestion.*?(?=\n|$)/gi
            ];
            
            issuePatterns.forEach(pattern => {
              let issueMatch;
              while ((issueMatch = pattern.exec(commentBody)) !== null) {
                issues.push(issueMatch[0]);
              }
            });
            
            core.setOutput('suggestions', JSON.stringify(suggestions));
            core.setOutput('issues', JSON.stringify(issues));
            core.setOutput('has_actionable_items', suggestions.length > 0 || issues.length > 0);
            
            console.log(`Found ${suggestions.length} code suggestions`);
            console.log(`Found ${issues.length} issues/warnings`);
            
            return {
              suggestions: suggestions,
              issues: issues,
              hasActionableItems: suggestions.length > 0 || issues.length > 0
            };

      - name: Create Copilot Response Comment
        if: steps.parse_feedback.outputs.has_actionable_items == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.detect_feedback.outputs.pr_number }}';
            const suggestions = JSON.parse('${{ steps.parse_feedback.outputs.suggestions }}');
            const issues = JSON.parse('${{ steps.parse_feedback.outputs.issues }}');
            
            let responseBody = `## 🤖 Copilot: CodeRabbit Feedback Detected\n\n`;
            responseBody += `I've detected actionable feedback from CodeRabbit on this PR.\n\n`;
            
            if (suggestions.length > 0) {
              responseBody += `### 📝 Code Suggestions (${suggestions.length})\n`;
              suggestions.forEach((suggestion, index) => {
                responseBody += `${index + 1}. \`\`\`\n${suggestion}\n\`\`\`\n`;
              });
              responseBody += `\n`;
            }
            
            if (issues.length > 0) {
              responseBody += `### ⚠️ Issues & Warnings (${issues.length})\n`;
              issues.forEach((issue, index) => {
                responseBody += `${index + 1}. ${issue}\n`;
              });
              responseBody += `\n`;
            }
            
            responseBody += `### 🎯 Next Actions\n`;
            responseBody += `- I can help implement these suggestions if you'd like\n`;
            responseBody += `- Use \`@copilot implement coderabbit suggestions\` to auto-apply safe changes\n`;
            responseBody += `- Use \`@copilot create issue\` to track complex changes separately\n\n`;
            responseBody += `---\n`;
            responseBody += `*This comment was generated automatically by the CodeRabbit-Copilot integration workflow.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
              body: responseBody
            });
            
            console.log('Posted Copilot response comment');

      - name: Label PR with CodeRabbit Feedback
        if: steps.parse_feedback.outputs.has_actionable_items == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.detect_feedback.outputs.pr_number }}';
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(prNumber),
              labels: ['coderabbit-feedback-detected', 'copilot-actionable']
            });
            
            console.log('Added feedback detection labels to PR');

  monitor-coderabbit-prs:
    name: Monitor CodeRabbit Generated PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'coderabbit-generated')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add PR Status Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            
            const statusComment = `## 🔄 CodeRabbit-Generated PR Status
            
            This PR was automatically created by CodeRabbit based on review feedback.
            
            ### 📋 Integration Status
            - ✅ CodeRabbit feedback processed
            - ✅ Automated fixes applied
            - ✅ Copilot monitoring enabled
            - 🔄 Awaiting human review
            
            ### 🎯 Reviewer Guidelines
            - Review changes carefully before merging
            - Verify that fixes address the original feedback
            - Check that no functionality is broken
            - Consider running additional tests if needed
            
            ### 🤖 Automation Labels
            This PR includes the following automation markers:
            ${context.payload.pull_request.labels.map(label => `- \`${label.name}\``).join('\n')}
            
            ---
            *This status was generated by the CodeRabbit-Copilot integration workflow.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: statusComment
            });
            
            console.log('Added status comment to CodeRabbit-generated PR');